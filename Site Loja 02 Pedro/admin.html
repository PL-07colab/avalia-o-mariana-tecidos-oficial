<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Mariana Tecidos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estrutura Principal */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #102d8f;
            margin-bottom: 25px;
            font-size: 1.8rem;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 10px;
        }

        /* Seção de Filtros */
        .filter-section {
            display: flex;
            gap: 20px;
            align-items: flex-end;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #e9ecef;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #495057;
        }

        /* Inputs e Selects */
        input[type="date"],
        select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            height: 42px;
            box-sizing: border-box;
            font-size: 14px;
            min-width: 200px;
            transition: border-color 0.2s;
        }

        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #102d8f;
        }

        /* Botões e Stats */
        #btnLimpar {
            height: 42px;
            padding: 0 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s;
        }

        #btnLimpar:hover {
            background: #5a6268;
        }

        .stats-box {
            margin-bottom: 20px;
            font-weight: 600;
            color: #102d8f;
            font-size: 1.1rem;
            background: #eef2ff;
            padding: 10px 15px;
            border-radius: 8px;
            display: inline-block;
        }

        /* Tabela */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
            overflow: hidden;
            border-radius: 8px;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            text-align: left;
        }

        th {
            background-color: #102d8f;
            color: white;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background-color: #fcfcfc;
        }

        tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>

<body>

    <div class="admin-container">
        <h1>Relatório de Avaliações - Mariana Tecidos</h1>

        <div class="stats-box">
            Total de Avaliações Filtradas: <span id="totalAvaliacoes">0</span>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label for="filtroVendedora">Colaborador(a):</label>
                <select id="filtroVendedora">
                    <option value="todos">Todas</option>
                    <option value="Amanda">Amanda</option>
                    <option value="Ana Clara">Ana Clara</option>
                    <option value="Camilo">Camilo</option>
                    <option value="Carlos">Carlos</option>
                    <option value="Cassia">Cassia</option>
                    <option value="Cinthia">Cinthia</option>
                    <option value="Evillen">Evillen</option>
                    <option value="Jaqueline">Jaqueline</option>
                    <option value="Jane">Jane</option>
                    <option value="Josyelma">Josyelma</option>
                    <option value="Larissa">Larissa</option>
                    <option value="Luiza">Luiza</option>
                    <option value="Marcia">Marcia</option>
                    <option value="Monica">Monica</option>
                    <option value="Suelaine">Suelaine</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="filtroData">Data Específica:</label>
                <input type="date" id="filtroData">
            </div>

            <button id="btnLimpar">Limpar Filtros</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Vendedora</th>
                    <th>Nota</th>
                    <th>Comentário</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                <tr>
                    <td colspan="4">Carregando dados...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="admin.js"></script>
</body>

</html>
