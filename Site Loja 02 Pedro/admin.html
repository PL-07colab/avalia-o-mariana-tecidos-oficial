<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Mariana Tecidos</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilos do Painel */
        .admin-container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: none; /* Escondido até acertar a senha */
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #102d8f; color: white; }
        
        .filter-section {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: flex-end;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }
        
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .stats-box { margin-bottom: 20px; font-weight: bold; color: #102d8f; font-size: 1.2rem; }

        input[type="date"], select {
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
            height: 40px; 
            box-sizing: border-box; 
            font-family: inherit;
            font-size: 14px;
            min-width: 150px;
        }

        #btnLimpar {
            height: 40px;
            padding: 0 15px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* ESTILOS DO MODAL DE SENHA */
        #modalSenha {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 350px;
            width: 90%;
        }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            box-sizing: border-box;
        }
        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #102d8f;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="modalSenha">
        <div class="modal-content">
            <h2 style="color: #102d8f;">Acesso Restrito</h2>
            <p>Digite a senha da Mariana Tecidos:</p>
            <input type="password" id="inputSenhaMestre" placeholder="****">
            <button id="btnVerificarSenha">Entrar no Painel</button>
        </div>
    </div>

    <div class="admin-container" id="conteudoPainel">
        <h1>Relatório de Avaliações - Mariana Tecidos</h1>
        
        <div class="stats-box">
            Total de Avaliações Filtradas: <span id="totalAvaliacoes">0</span>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label>Colaborador(a):</label>
                <select id="filtroVendedora">
                    <option value="todos">Todas</option>
                    <option value="Amanda">Amanda</option>
                    <option value="Ana Clara">Ana Clara</option>
                    <option value="Camilo">Camilo</option>
                    <option value="Carlos">Carlos</option>
                    <option value="Cassia">Cassia</option>
                    <option value="Cinthia">Cinthia</option>
                    <option value="Evillen">Evillen</option>
                    <option value="Jaqueline">Jaqueline</option>
                    <option value="Jane">Jane</option>
                    <option value="Josyelma">Josyelma</option>
                    <option value="Larissa">Larissa</option>
                    <option value="Luiza">Luiza</option>
                    <option value="Marcia">Marcia</option>
                    <option value="Monica">Monica</option>
                    <option value="Suelaine">Suelaine</option>
                </select>
            </div>

            <div class="filter-group">
                <label>De:</label>
                <input type="date" id="filtroDataInicio">
            </div>

            <div class="filter-group">
                <label>Até:</label>
                <input type="date" id="filtroDataFim">
            </div>

            <button id="btnLimpar">Limpar Filtros</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Vendedora</th>
                    <th>Nota</th>
                    <th>Comentário</th>
                </tr>
            </thead>
            <tbody id="tabelaCorpo">
                <tr><td colspan="4">Carregando dados...</td></tr>
            </tbody>
        </table>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
